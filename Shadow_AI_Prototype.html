<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Cynet · Shadow AI — Interactive Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ============ DS3 Foundations tokens (dark theme) ============ */
:root{
  --bg-default:#0c1322; --bg-sidemenu:#0a101d; --bg-header:#0c1322;
  --surface:#141d30; --surface-2:#1a2440; --bg-dropdown:#1a2440;
  --bg-blanket:rgba(6,10,18,.7);
  --table-hover:#161f36; --menu-hover:#131c2f; --menu-selected:#2f80ff;
  --btn-primary:#2f80ff; --btn-primary-hover:#1f6fee;
  --btn-outline:rgba(255,255,255,.16);
  --text-primary:#e8eef9; --text-secondary:#9aabc2; --text-tertiary:#6b7a93;
  --text-link:#5aa0ff; --text-link-hover:#7db4ff;
  --critical:#f15b5b; --critical-bg:#3a1d22;
  --high:#f3a64a; --high-bg:#382816;
  --medium:#f0c64a; --medium-bg:#332d15;
  --low:#46c08d; --low-bg:#14302a;
  --info:#5aa0ff; --info-bg:#142540;
  --purple:#9b8cff; --purple-bg:#241f44; --teal:#33b6c4; --teal-bg:#15323a; --olive:#cdb14a; --olive-bg:#322c14;
  --hairline:rgba(255,255,255,.07);
  --help:#e6398a;
  --guide:#ff3d92; --guide-2:#ff7ab8; --guide-bg:#3a1830; --guide-line:rgba(255,61,146,.5);
  --guide-d:#e22a7e; --guide-lt:#ffd2e6; --guide-soft:rgba(255,255,255,.15);
  --radius:12px; --radius-sm:8px;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{font-family:Inter,system-ui,sans-serif;background:var(--bg-default);color:var(--text-primary);
  font-size:14px;line-height:20px;-webkit-font-smoothing:antialiased}
.h5{font-size:28px;line-height:36px;font-weight:400}
.h6{font-size:20px;line-height:28px;font-weight:600}
.sub1{font-size:16px;line-height:24px;font-weight:600}
.sub2{font-size:14px;line-height:18px;font-weight:600}
.cap2{font-size:12px;line-height:16px;color:var(--text-secondary)}
.t-sec{color:var(--text-secondary)}.t-ter{color:var(--text-tertiary)}
a,.linkish{color:var(--text-link);text-decoration:none;cursor:pointer}
a:hover,.linkish:hover{color:var(--text-link-hover)}

/* shell */
.app{display:flex;min-height:100vh}
.side{width:230px;flex:0 0 230px;background:var(--bg-sidemenu);border-right:1px solid var(--hairline);
  display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
.side.collapsed{width:62px;flex-basis:62px}
.logo{display:flex;align-items:center;gap:10px;padding:18px 18px 14px;font-weight:700;font-size:18px;color:#fff}
.nav{flex:1;overflow-y:auto;padding:6px 10px}
.nav-item{display:flex;align-items:center;gap:12px;padding:9px 12px;border-radius:9px;color:var(--text-secondary);
  cursor:pointer;margin-bottom:2px;white-space:nowrap;font-size:14px}
.nav-item:hover{background:var(--menu-hover);color:var(--text-primary)}
.nav-item.active{background:var(--menu-selected);color:#fff;font-weight:600}
.nav-item.active svg{stroke:#fff}
.nav-item svg{flex:0 0 18px;width:18px;height:18px;stroke:var(--text-tertiary);fill:none;stroke-width:1.7}
.nav-item .chev{margin-left:auto;opacity:.5}
.side.collapsed .nav-item span,.side.collapsed .logo span,.side.collapsed .nav-item .chev{display:none}
.collapse{padding:12px 18px;border-top:1px solid var(--hairline);color:var(--text-tertiary);cursor:pointer;font-size:18px}
.main{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{height:62px;display:flex;align-items:center;gap:12px;padding:0 22px;background:var(--bg-header);
  border-bottom:1px solid var(--hairline);position:sticky;top:0;z-index:30}
.crumbs{display:flex;align-items:center;gap:8px;color:var(--text-tertiary);font-size:13px}
.crumbs b{color:var(--text-primary);font-weight:600;font-size:20px;line-height:28px}
.crumb-link{color:var(--text-link);cursor:pointer;font-size:13px}.crumbs .sep{opacity:.45}
.topbar .spacer{flex:1}
.tb-icon{width:34px;height:34px;border-radius:9px;display:grid;place-items:center;color:var(--text-secondary);cursor:pointer}
.tb-icon:hover{background:var(--menu-hover);color:var(--text-primary)}
.tb-icon.help{background:var(--help);color:#fff}
.tb-icon.ai{background:linear-gradient(135deg,#7c5cff,#33b6c4);color:#fff}
.sitepick{display:flex;align-items:center;gap:9px;background:var(--surface-2);border:1px solid var(--hairline);
  border-radius:9px;padding:7px 12px;cursor:pointer;font-size:14px}
.sitepick .sq{width:18px;height:18px;border-radius:5px;background:var(--btn-primary);display:grid;place-items:center;color:#fff}
.sitepick.mssp .sq{background:var(--btn-primary)} .crown{color:#ffd34d}

/* scenario / walkthrough toolbar */
.scnbar{display:flex;align-items:center;gap:10px;padding:9px 12px;background:rgba(33,18,28,.96);backdrop-filter:blur(8px);
  border:1px solid var(--guide-line);border-radius:13px;box-shadow:0 12px 34px rgba(0,0,0,.4);
  position:fixed;top:72px;left:246px;right:16px;z-index:45;overflow-x:auto}
.scnbar.hidden{display:none}
.bar-collapse{margin-left:6px;flex:0 0 auto;width:28px;height:28px;border-radius:8px;display:grid;place-items:center;color:var(--guide-2);cursor:pointer;border:1px solid var(--guide-line)}
.bar-collapse:hover{color:#fff;background:rgba(255,61,146,.2)}
.scnfab{position:fixed;top:74px;right:18px;width:46px;height:46px;border-radius:50%;background:var(--guide);color:#fff;
  display:none;place-items:center;cursor:pointer;z-index:45;box-shadow:0 6px 18px rgba(0,0,0,.4)}
.scnfab.show{display:grid}
.scnfab:hover{filter:brightness(1.08)}
.msec{margin-top:15px}.msec .mlab{font-size:11px;text-transform:uppercase;letter-spacing:.4px;color:var(--guide-2);font-weight:600;margin-bottom:6px}
.msec .mtx{font-size:13px;color:var(--text-secondary);line-height:19px}
.flow{display:flex;flex-wrap:wrap;align-items:center;gap:8px}
.fstep{background:var(--surface-2);border:1px solid var(--hairline);border-radius:8px;padding:7px 11px;font-size:12px;color:var(--text-primary)}
.fstep .fn{color:var(--guide);font-weight:700;margin-right:6px}
.farr{color:var(--guide-2)}
.btn.guide{background:var(--guide);color:#fff;border:none}
.btn.guide:hover{filter:brightness(1.07)}
#scnBlanket .modal{border-top:3px solid var(--guide)}
.scnbar .lbl{display:flex;align-items:center;gap:8px;color:var(--guide-2);font-size:13px;white-space:nowrap;font-weight:600}
.scnbar .lbl svg{stroke:var(--guide)}
.scn-btn{display:flex;align-items:center;gap:9px;background:var(--surface);border:1px solid var(--hairline);
  border-radius:9px;padding:6px 11px;cursor:pointer;white-space:nowrap;color:var(--text-primary)}
.scn-btn:hover{border-color:var(--guide-line)}
.scn-btn .num{width:20px;height:20px;border-radius:6px;background:var(--guide-bg);color:var(--guide-2);display:grid;place-items:center;font-size:11px;font-weight:700}
.scn-btn .nm{font-size:13px;font-weight:600;line-height:14px}
.scn-btn .pp{font-size:11px;color:var(--text-tertiary);line-height:13px}
.scn-btn.active{border-color:var(--guide);background:var(--guide-bg)}

.content{padding:20px 22px;max-width:1720px;width:100%}

/* insights header */
.ins-head{display:flex;align-items:center;gap:10px;margin:2px 0 12px}
.ins-head .fire{color:var(--high)}
.ins-head .title{font-size:16px;font-weight:600}
.ins-head .spacer{flex:1}
.ins-toggle{color:var(--text-secondary);font-size:13px;cursor:pointer;display:flex;gap:6px;align-items:center}

/* compact KPI cards */
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
.kpi{background:var(--surface);border:1px solid var(--hairline);border-radius:var(--radius);padding:13px 15px;min-height:92px}
.kpi .top{display:flex;align-items:center;gap:9px}
.kpi .chip{width:30px;height:30px;border-radius:8px;display:grid;place-items:center;flex:0 0 30px}
.kpi .lab{font-size:11px;letter-spacing:.4px;text-transform:uppercase;color:var(--text-secondary);font-weight:600;line-height:14px}
.kpi .val{font-size:26px;line-height:30px;font-weight:700;margin-top:8px}
.kpi .val small{font-size:13px;font-weight:500;color:var(--text-secondary)}
.kpi .sub{color:var(--text-tertiary);font-size:11px;margin-top:3px}
.kpi.chartcard{padding:11px 14px}
.kpi.chartcard .lab{margin-bottom:4px}

/* insights chips row */
.insights{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px}
.insight{background:var(--surface);border:1px solid var(--hairline);border-left:3px solid var(--info);
  border-radius:var(--radius-sm);padding:10px 13px;font-size:13px;display:flex;gap:9px;align-items:flex-start}
.insight.warn{border-left-color:var(--high)}.insight.crit{border-left-color:var(--critical)}
.insight svg{stroke:var(--text-secondary);flex:0 0 16px;margin-top:1px}

.panel{background:var(--surface);border:1px solid var(--hairline);border-radius:var(--radius);margin-bottom:16px;overflow:hidden}
.panel-h{display:flex;align-items:center;gap:10px;padding:13px 16px;border-bottom:1px solid var(--hairline)}
.panel-h .title{font-size:15px;font-weight:600}.panel-h .spacer{flex:1}
.cols2{display:grid;grid-template-columns:1.5fr 1fr;gap:16px}

/* toolbar */
.toolbar{display:flex;align-items:center;gap:10px;padding:11px 16px;border-bottom:1px solid var(--hairline)}
.icon-btn{width:38px;height:38px;border-radius:9px;border:1px solid var(--hairline);background:var(--bg-default);
  display:grid;place-items:center;color:var(--text-secondary);cursor:pointer}
.icon-btn:hover{color:var(--text-primary);border-color:#ffffff22}
.search{display:flex;align-items:center;gap:8px;background:var(--bg-default);border:1px solid var(--hairline);border-radius:9px;
  padding:8px 12px;min-width:240px;color:var(--text-tertiary);flex:1;max-width:420px}
.search input{background:none;border:none;outline:none;color:var(--text-primary);font:inherit;width:100%}
.datepick{display:flex;align-items:center;gap:8px;background:var(--bg-default);border:1px solid var(--hairline);border-radius:9px;padding:8px 12px;color:var(--text-secondary);cursor:pointer}
.toolbar .spacer{flex:1}
.chip-f{display:inline-flex;align-items:center;gap:6px;background:var(--surface-2);border:1px solid var(--hairline);border-radius:16px;padding:4px 8px 4px 10px;font-size:12px}
.chip-f .x{cursor:pointer;color:var(--text-tertiary)}

.btn{display:inline-flex;align-items:center;gap:7px;border-radius:9px;padding:8px 14px;font:inherit;font-weight:500;cursor:pointer;border:1px solid transparent}
.btn.primary{background:var(--btn-primary);color:#fff}.btn.primary:hover{background:var(--btn-primary-hover)}
.btn.outline{background:transparent;border-color:var(--btn-outline);color:var(--text-primary)}.btn.outline:hover{border-color:#ffffff40}
.btn.ghost{background:transparent;color:var(--text-link)}
.btn svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.8}

table{width:100%;border-collapse:collapse}
thead th{text-align:left;font-size:11px;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.4px;padding:11px 16px;border-bottom:1px solid var(--hairline)}
thead th .sf{display:inline-flex;gap:4px;margin-left:5px;opacity:.5;vertical-align:middle}
tbody td{padding:12px 16px;border-bottom:1px solid var(--hairline);font-size:14px;vertical-align:middle}
tbody tr{cursor:pointer}tbody tr:hover{background:var(--table-hover)}
tbody tr:last-child td{border-bottom:none}
.row-actions{text-align:right;white-space:nowrap;color:var(--text-tertiary)}
.row-actions .btn{margin-right:6px;vertical-align:middle}
.row-actions .linkish{margin-right:4px}
.svc{display:flex;align-items:center;gap:10px}
.ava{width:28px;height:28px;border-radius:8px;display:grid;place-items:center;font-size:11px;font-weight:700}
.ava-round{border-radius:50%;background:var(--surface-2);color:var(--text-secondary)}

/* badges / tags / counters */
.badge{display:inline-flex;align-items:center;gap:5px;border-radius:6px;padding:2px 8px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.3px}
.badge.crit{color:var(--critical);background:var(--critical-bg)}.badge.high{color:var(--high);background:var(--high-bg)}
.badge.med{color:var(--medium);background:var(--medium-bg)}.badge.low{color:var(--low);background:var(--low-bg)}
.badge.info{color:var(--info);background:var(--info-bg)}.badge.neutral{color:var(--text-secondary);background:#1d2740}
.dotsev{display:inline-block;width:7px;height:7px;border-radius:50%}
.ctag{display:inline-flex;align-items:center;gap:5px;border-radius:6px;padding:2px 8px;font-size:12px;font-weight:600}
.ctag svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:1.8}
.tag{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--hairline);border-radius:6px;padding:2px 8px;font-size:12px;color:var(--text-secondary)}
.tag svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:1.8}
.counter{background:#1d2740;color:var(--text-secondary);border-radius:11px;font-size:12px;padding:1px 8px;font-weight:600}
.dot{width:7px;height:7px;border-radius:50%;display:inline-block}.dot.on{background:var(--low)}.dot.off{background:var(--text-tertiary)}
.pill-poc{background:var(--purple-bg);color:var(--purple);border-radius:6px;padding:1px 7px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px}
.riskscore{font-weight:700;font-size:15px}

/* top users widget */
.uitem{display:flex;align-items:center;gap:11px;padding:10px 16px;border-bottom:1px solid var(--hairline);cursor:pointer}
.uitem:hover{background:var(--table-hover)}.uitem:last-child{border-bottom:none}
.uitem .meta{flex:1;min-width:0}.uitem .nm{font-size:13px;color:var(--text-link);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.uitem .sb{font-size:11px;color:var(--text-tertiary)}.uitem .ses{font-weight:700;font-size:15px;text-align:right}

/* expandable users */
.subrow td{background:#0f1828}
.app-line{display:flex;align-items:center;gap:10px;padding:6px 0;color:var(--text-secondary);font-size:13px}
.appicon{width:20px;height:20px;border-radius:5px;display:inline-grid;place-items:center;font-size:10px;font-weight:700}
.expander{transition:transform .15s;display:inline-block;color:var(--text-tertiary)}.expander.open{transform:rotate(90deg)}

/* domain access */
.dacard{padding:8px 16px}
.dom{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--hairline)}
.dom:last-child{border-bottom:none}.dom .l{display:flex;align-items:center;gap:11px}
.dom .ic{width:30px;height:30px;border-radius:8px;background:var(--surface-2);display:grid;place-items:center;color:var(--text-secondary)}

/* forensics */
.fxbar{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.timeline{background:#0a0f1c;border:1px solid var(--hairline);border-radius:var(--radius);padding:16px 20px;margin-bottom:14px;overflow-x:auto}
.tl-track{display:flex;align-items:flex-start;min-width:920px;position:relative;padding-top:6px}
.tl-node{display:flex;flex-direction:column;align-items:center;gap:7px;position:relative;flex:1}
.tl-node .nd{width:38px;height:38px;border-radius:10px;background:var(--surface);border:1px solid var(--hairline);display:grid;place-items:center;color:var(--text-secondary);z-index:2}
.tl-node.alert .nd{background:var(--critical-bg);border-color:#f15b5b66;color:var(--critical);box-shadow:0 0 0 4px #f15b5b22}
.tl-node .lab{font-size:11px;color:var(--text-secondary);text-align:center;max-width:84px}
.tl-node .tm{font-size:10px;color:var(--text-tertiary)}
.tl-line{position:absolute;top:25px;left:50%;width:100%;height:2px;background:var(--hairline);z-index:1}
.tl-node:last-child .tl-line{display:none}
.graphwrap{display:grid;grid-template-columns:1fr 330px;gap:14px;margin-bottom:14px}
.graph{background:radial-gradient(circle at 60% 50%,#101a2e,#0a0f1c);border:1px solid var(--hairline);border-radius:var(--radius);min-height:320px;display:grid;place-items:center;padding:10px}
.risk{background:var(--surface);border:1px solid var(--hairline);border-radius:var(--radius);padding:4px 0}
.risk .ri{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid var(--hairline)}
.risk .ri:last-child{border-bottom:none}
.risk .ri .ico{width:32px;height:32px;border-radius:9px;display:grid;place-items:center;flex:0 0 32px}
.risk .ri .sc{margin-left:auto;font-weight:700;border-radius:14px;padding:2px 9px;font-size:12px}
.tabbar{display:flex;gap:2px;border-bottom:1px solid var(--hairline);overflow-x:auto}
.tabx{padding:12px 16px;color:var(--text-secondary);cursor:pointer;white-space:nowrap;font-size:14px;border-bottom:2px solid transparent}
.tabx:hover{color:var(--text-primary)}.tabx.active{color:var(--text-primary);border-bottom-color:var(--btn-primary);font-weight:600}
.detail-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;padding:18px}
.detail-col h4{margin:0 0 10px;color:var(--text-link);font-size:12px;text-transform:uppercase;letter-spacing:.5px;font-weight:600;border-bottom:1px solid var(--hairline);padding-bottom:8px}
.kv{display:flex;justify-content:space-between;gap:12px;padding:7px 0;font-size:13px}
.kv .k{color:var(--text-secondary)}.kv .v{text-align:right}

/* modal */
.blanket{position:fixed;inset:0;background:var(--bg-blanket);display:none;align-items:center;justify-content:center;z-index:120}
.blanket.show{display:flex}
.modal{background:var(--bg-dropdown);border:1px solid var(--hairline);border-radius:14px;width:520px;max-width:92vw;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.modal-h{display:flex;align-items:center;padding:18px 20px;border-bottom:1px solid var(--hairline)}
.modal-h .tt{font-size:18px;font-weight:600}.modal-h .x{margin-left:auto;cursor:pointer;color:var(--text-secondary)}
.modal-b{padding:20px}.modal-f{display:flex;justify-content:flex-end;gap:10px;padding:16px 20px;border-top:1px solid var(--hairline)}
.opt{display:flex;align-items:flex-start;gap:10px;padding:11px 12px;border:1px solid var(--hairline);border-radius:9px;margin-bottom:10px;cursor:pointer}
.opt:hover{border-color:#ffffff33}.opt input{accent-color:var(--btn-primary);margin-top:3px}

.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--surface-2);border:1px solid var(--hairline);border-radius:10px;padding:12px 18px;box-shadow:0 10px 30px rgba(0,0,0,.4);z-index:200;display:none}
.toast.show{display:block}

/* ====== walkthrough (coachmarks) ====== */
#tour{position:fixed;inset:0;z-index:100;display:none}
#tour.show{display:block}
.tour-block{position:absolute;inset:0;cursor:default}
.tour-spot{position:fixed;border:2px solid var(--guide);border-radius:10px;box-shadow:0 0 0 9999px rgba(7,11,20,.74),0 0 0 4px rgba(255,61,146,.25);
  transition:all .25s ease;pointer-events:none;display:none}
.tour-bubble{position:fixed;width:340px;max-width:90vw;background:var(--bg-dropdown);border:1px solid var(--guide-line);border-top:3px solid var(--guide);border-radius:12px;
  box-shadow:0 16px 50px rgba(0,0,0,.55);padding:16px;z-index:102}
.tour-bubble .pchip{display:inline-flex;align-items:center;gap:6px;background:var(--guide-bg);color:var(--guide-2);border-radius:14px;padding:2px 9px;font-size:11px;font-weight:700;margin-bottom:8px}
.tour-bubble .tt{font-size:15px;font-weight:600;margin-bottom:5px}
.tour-bubble .tx{font-size:13px;color:var(--text-secondary);line-height:19px}
.tour-bubble .ft{display:flex;align-items:center;gap:8px;margin-top:14px}
.tour-bubble .step{font-size:12px;color:var(--text-tertiary);margin-right:auto}
.tour-bubble .mini{background:transparent;border:1px solid var(--btn-outline);color:var(--text-primary);border-radius:8px;padding:6px 12px;cursor:pointer;font:inherit}
.tour-bubble .mini.primary{background:var(--guide);border-color:transparent;color:#fff}
.tour-bubble .skip{position:absolute;top:12px;right:14px;color:var(--text-tertiary);cursor:pointer;font-size:12px}

/* ===== Guide layer: solid pink surfaces ===== */
.scnbar{background:var(--guide);border:1px solid var(--guide-d);box-shadow:0 10px 28px rgba(0,0,0,.4)}
.scnbar .lbl{color:#fff}.scnbar .lbl svg{stroke:#fff}
.scn-btn{background:var(--guide-soft);border:1px solid rgba(255,255,255,.28);color:#fff}
.scn-btn:hover{background:rgba(255,255,255,.26);border-color:rgba(255,255,255,.5)}
.scn-btn .num{background:rgba(255,255,255,.28);color:#fff}
.scn-btn .nm{color:#fff}.scn-btn .pp{color:var(--guide-lt)}

function areaChart(vals,color,w,h){
  w=w||190;h=h||44;const max=Math.max(...vals),min=Math.min(...vals);
  const pts=vals.map((v,i)=>[i/(vals.length-1)*w,h-((v-min)/((max-min)||1))*(h-6)-3]);
  const line=pts.map((p,i)=>(i?'L':'M')+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ');
  const area=line+` L${w} ${h} L0 ${h} Z`;
  return `<svg width="100%" height="${h}" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
    <defs><linearGradient id="g${color.replace('#','')}" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="${color}" stop-opacity=".35"/><stop offset="1" stop-color="${color}" stop-opacity="0"/></linearGradient></defs>
    <path d="${area}" fill="url(#g${color.replace('#','')})"/><path d="${line}" fill="none" stroke="${color}" stroke-width="2"/></svg>`;
}
function miniBars(vals,color,w,h){
  w=w||190;h=h||44;const max=Math.max(...vals);const bw=w/vals.length;
  return `<svg width="100%" height="${h}" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">${
    vals.map((v,i)=>{const bh=(v/max)*(h-4);return `<rect x="${(i*bw+bw*0.18).toFixed(1)}" y="${(h-bh).toFixed(1)}" width="${(bw*0.64).toFixed(1)}" height="${bh.toFixed(1)}" rx="2" fill="${color}"/>`}).join('')
  }</svg>`;
}
function donut(segs,size){ // segs:[{v,color}]
  size=size||110;const r=size/2-9,cx=size/2,cy=size/2,C=2*Math.PI*r;let off=0;const tot=segs.reduce((a,s)=>a+s.v,0);
  const arcs=segs.map(s=>{const len=s.v/tot*C;const el=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${s.color}" stroke-width="9" stroke-dasharray="${len.toFixed(1)} ${(C-len).toFixed(1)}" stroke-dashoffset="${(-off).toFixed(1)}" transform="rotate(-90 ${cx} ${cy})"/>`;off+=len;return el}).join('');
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}"><circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#1d2740" stroke-width="9"/>${arcs}<text x="${cx}" y="${cy+5}" text-anchor="middle" fill="#e8eef9" font-size="20" font-weight="700">${tot}</text></svg>`;
}

  {id:'s2',name:'Unsanctioned usage',persona:'IT / Security Generalist',
    desc:'Assess risk from unauthorized AI usage — quantify how much AI activity happens through unapproved or unsanctioned services, and investigate specific instances to decide whether sensitive data may be at risk.',
    scenario:'The IT person heard that DeepSeek is not an approved tool. He wants to know whether anyone in the company is using it, and whether sensitive data could be leaving through it.',
    flow:['Open Shadow AI','Spot the flagged service','Open DeepSeek','See users & endpoints','Drill to the host'],
    steps:[
      {nav:{s:'shadow'},sel:'#t-deepseek',tt:'A service he never approved',tx:'On the Shadow AI page, DeepSeek shows up flagged as unsanctioned. The IT person clicks in to find out who is behind it.'},
      {nav:{s:'service',p:'deepseek'},sel:'#t-svcusers',tt:'Who used it, and where',tx:'Two users appear — one on a managed endpoint, one in an unmanaged session. Now he can weigh whether sensitive data was exposed.'},
      {sel:'#t-svcusers',tt:'Follow the trail',tx:'From here he jumps to the endpoint to open host forensics, or to the user record — to see exactly what that person could reach.'},
    ]},
  {id:'s3',name:'Top-risk users',persona:'SOC Analyst',
    desc:'Prioritize user-level AI exposure — identify which users represent the highest AI-related risk through heavy use of unsanctioned or sensitive services, and investigate them first.',
    scenario:'The SOC analyst has limited time and wants to focus where it matters. Who are the heaviest AI users, and how exposed are their accounts?',
    flow:['Open Shadow AI','Open Top GenAI Users','Pick the heaviest user','Open the cloud-user record','Review per-app exposure'],
    steps:[
      {nav:{s:'shadow'},sel:'#t-topusers',tt:'Where to focus first',tx:'The analyst checks the Top GenAI Users widget. r.azoulay tops the list — 412 sessions across 5 services — clearly the user to look at first.'},
      {nav:{s:'users'},sel:'#t-firstuser',tt:'How exposed is that identity?',tx:'He opens the existing cloud-user record and expands it to see MFA, admin rights and last login per app — the full exposure behind the heavy AI usage.'},
    ]},
  {id:'s4',name:'Endpoint AI apps',persona:'SOC Analyst',
    desc:'Prioritize AI risk on endpoints — find endpoint AI applications that expand the attack surface (local access plus broad domain/connector reach), tell Active from Inactive, and investigate the riskiest.',
    scenario:'The SOC analyst noticed an autonomous AI agent running on company machines and wants to understand what it can actually touch before it becomes an incident.',
    flow:['Open Shadow AI','Open OpenClaw Agent','Review domain access','Active vs Inactive','Drill to the host'],
    steps:[
      {nav:{s:'shadow'},sel:'#t-openclaw',tt:'An agent with a mind of its own',tx:'OpenClaw Agent is flagged critical and runs on 3 endpoints. The analyst opens it to see what it can reach.'},
      {nav:{s:'endpointapp',p:'openclaw'},sel:'#t-domains',tt:'Its real attack surface',tx:'Domain Access lays out everything the agent can reach — Google Drive, GitHub, even the internal CRM. Local access plus this reach is exactly the high-risk case.'},
      {sel:'#t-eps',tt:'From app to host',tx:'He confirms which instances are Active, then drills into a specific endpoint to open host forensics and investigate.'},
    ]},
  {id:'s5',name:'Cross-client triage',persona:'MSP Technician',
    desc:'Prioritize which client needs attention today — identify the customer with the most significant AI-related exposure without reviewing every client individually.',
    scenario:'The MSP technician manages many clients and starts the day with limited time. Which customer has the biggest AI problem right now?',
    flow:['Open MSSP dashboard','Read AI exposure per client','Pick the most exposed','Enter that client’s Shadow AI'],
    steps:[
      {nav:{s:'mssp'},sel:'#t-mssp-kpi',tt:'All clients at a glance',tx:'At MSSP level the technician sees AI exposure across every customer at once — services, endpoint AI apps and unmanaged usage.'},
      {sel:'#t-mssp-row',tt:'Go where it hurts most',tx:'GreenLeaf Dental is flagged critical today. He opens it and drops straight into its Shadow AI view — no need to check every client one by one.'},
    ]},
  {id:'s6',name:'Report & export',persona:'CISO / Compliance',
    desc:'Report for compliance and leadership — produce a clear, non-technical summary of AI usage for a board update, a client-facing report, or an audit submission.',
    scenario:'The CISO has a board meeting and needs to show that the company’s AI risk is understood and under control — without dumping raw data on the executives.',
    flow:['Open Shadow AI','Click Export','Choose a format','Share with leadership'],
    steps:[
      {nav:{s:'shadow'},sel:'#t-export',tt:'Time to brief the board',tx:'When leadership asks “what are we doing about AI?”, the CISO clicks Export from the Shadow AI page.'},
      {action:openModal,sel:'#t-repopts',tt:'A story they can read',tx:'She picks an executive summary — or a co-branded client report — that tells the AI-risk story in plain language, no raw data required.'},
    ]},
];
let pendingScn=null;
function renderScnbar(){
  document.getElementById('scnbar').innerHTML=
    `<span class="lbl">${'<svg width=16 height=16 viewBox="0 0 24 24" fill=none stroke=currentColor stroke-width=1.8>'+ICN.bolt+'</svg>'} Guided scenarios:</span>`+
    scenarios.map((s,i)=>`<div class="scn-btn" id="scn-${s.id}" onclick="openScenario('${s.id}')"><span class="num">${i+1}</span><div><div class="nm">${s.name}</div><div class="pp">${s.persona}</div></div></div>`).join('')+
    `<span class="bar-collapse" onclick="collapseBar()" title="Collapse">✕</span>`;
}
function collapseBar(){document.getElementById('scnbar').classList.add('hidden');document.getElementById('scnfab').classList.add('show');}
function expandBar(){document.getElementById('scnbar').classList.remove('hidden');document.getElementById('scnfab').classList.remove('show');}
function openScenario(id){
  const s=scenarios.find(x=>x.id===id);if(!s)return;pendingScn=id;
  const i=scenarios.indexOf(s)+1;
  document.getElementById('scnModalTitle').textContent=`${i}. ${s.name}`;
  document.getElementById('scnModalBody').innerHTML=
    `<span class="pchip" style="display:inline-flex;align-items:center;gap:6px;background:var(--guide-bg);color:var(--guide-2);border-radius:14px;padding:3px 10px;font-size:12px;font-weight:700">${'<svg width=13 height=13 viewBox="0 0 24 24" fill=none stroke=currentColor stroke-width=2>'+ICN.users+'</svg>'} ${s.persona}</span>
     <div class="msec"><div class="mlab">Use case</div><div class="mtx">${s.desc}</div></div>
     <div class="msec"><div class="mlab">Scenario in this prototype</div><div class="mtx">${s.scenario}</div></div>
     <div class="msec"><div class="mlab">Expected workflow</div><div class="flow">${s.flow.map((f,k)=>`<div class="fstep"><span class="fn">${k+1}</span>${f}</div>${k<s.flow.length-1?'<span class="farr">→</span>':''}`).join('')}</div></div>`;
  document.getElementById('scnBlanket').classList.add('show');
}
function closeScn(){document.getElementById('scnBlanket').classList.remove('show');}
function startScenario(){document.getElementById('scnBlanket').classList.remove('show');startTour(pendingScn);}
let tour={id:null,i:0};
function startTour(id){tour={id,i:0};collapseBar();document.getElementById('tour').classList.add('show');
  document.querySelectorAll('.scn-btn').forEach(b=>b.classList.remove('active'));const a=document.getElementById('scn-'+id);if(a)a.classList.add('active');
  goStep(0);}
function endTour(){document.getElementById('tour').classList.remove('show');document.getElementById('tourSpot').style.display='none';closeModal();document.querySelectorAll('.scn-btn').forEach(b=>b.classList.remove('active'));tour.id=null;}
function goStep(n){
  const sc=scenarios.find(x=>x.id===tour.id);if(!sc)return;tour.i=n;const st=sc.steps[n];
  if(st.nav){stack=[{screen:st.nav.s,param:st.nav.p}];render(st.nav.s,st.nav.p);}
  if(st.action)st.action();
  // bubble content
  const bub=document.getElementById('tourBubble');
  bub.innerHTML=`<span class="skip" onclick="endTour()">Skip</span><span class="pchip">${'<svg width=12 height=12 viewBox="0 0 24 24" fill=none stroke=currentColor stroke-width=2>'+ICN.users+'</svg>'} ${sc.persona}</span>
    <div class="tt">${st.tt}</div><div class="tx">${st.tx}</div>
    <div class="ft"><span class="step">Step ${n+1} of ${sc.steps.length}</span>
    ${n>0?'<button class="mini" onclick="goStep('+(n-1)+')">Back</button>':''}
    ${n<sc.steps.length-1?'<button class="mini primary" onclick="goStep('+(n+1)+')">Next</button>':'<button class="mini primary" onclick="endTour()">Done</button>'}</div>`;
  setTimeout(()=>placeSpot(st.sel),260);
}
function placeSpot(sel){
  const spot=document.getElementById('tourSpot'),bub=document.getElementById('tourBubble');
  const el=sel?document.querySelector(sel):null;
  if(el){el.scrollIntoView({block:'center',behavior:'smooth'});}
  setTimeout(()=>{
    if(el){const r=el.getBoundingClientRect();
      spot.style.display='block';spot.style.top=(r.top-6)+'px';spot.style.left=(r.left-6)+'px';spot.style.width=(r.width+12)+'px';spot.style.height=(r.height+12)+'px';
      const bw=Math.min(340,innerWidth-24);const bh=bub.offsetHeight||190;
      let bx=r.left;if(bx+bw>innerWidth-12)bx=innerWidth-bw-12;if(bx<12)bx=12;
      let by=r.bottom+12;if(by+bh>innerHeight-12)by=Math.max(12,r.top-bh-12);
      bub.style.left=bx+'px';bub.style.top=by+'px';
    }else{spot.style.display='none';bub.style.left=(innerWidth/2-170)+'px';bub.style.top=(innerHeight/2-100)+'px';}
  },180);
}
window.addEventListener('resize',()=>{if(tour.id!=null){const sc=scenarios.find(x=>x.id===tour.id);placeSpot(sc.steps[tour.i].sel);}});

/* ===================== boot ===================== */
renderScnbar();document.getElementById('sitePick').onclick=()=>{stack=[];render('mssp');};
stack=[{screen:'mssp'}];render('mssp');
</script>
</body>
</html>
